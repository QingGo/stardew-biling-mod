name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build bilingual content pack
        env:
          PYTHONIOENCODING: utf-8
        run: |
          cd BilingualModBuilder
          python build_bilingual_pack.py --export-dir ..\_export --pairs en:zh de:en ja:zh

      - name: Create release zip
        run: |
          cd BilingualModBuilder
          $tag = "${{ github.ref_name }}"
          $zipName = "BilingualMod-$tag.zip"
          Compress-Archive -Path BilingualMod\* -DestinationPath $zipName
          echo "zip=$zipName" >> $env:GITHUB_ENV
          Move-Item $zipName ..\ -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: BilingualMod-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## Stardew Valley Bilingual Text ${{ github.ref_name }}

            ### 安装
            1. 下载 `BilingualMod-${{ github.ref_name }}.zip`
            2. 解压到 `Stardew Valley/Mods/BilingualMod/`
            3. 启动游戏（通过 `StardewModdingAPI.exe`）

            ### 配置
            通过 GMCM（Mods 按钮 → Stardew Valley Bilingual Text）选择 BilingualMode：

            | BilingualMode | 对应双语 | 游戏语言应设为 |
            |---|---|---|
            | `en-zh` | 英 + 中 | **中文** |
            | `de-en` | 德 + 英 | Deutsch 或 English 均可 |
            | `ja-zh` | 日 + 中 | **中文** 或 **日本語** 均可 |
            | `off` | 关闭双语 | 任意 |

            ⚠ 英语游戏语言下 CJK 字符会显示为 `*`，请将游戏语言设为对应 CJK 语言。
